<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SiteDrop</title>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --border: #2e2e38;
      --accent: #66ccff;
      --accent2: #4da6ff;
      --text: #e8e6f0;
      --muted: #6b6880;
      --danger: #e05c5c;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 22px; height: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }

    .header-actions { display: flex; gap: 6px; }

    .icon-btn {
      width: 28px; height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: var(--muted);
      transition: all 0.15s;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }

    .current-site {
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .site-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .site-hostname {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .site-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .site-status.active { color: #6ee7b7; }

    .section { padding: 12px 16px; }

    .section-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .photo-thumb {
      aspect-ratio: 1;
      border-radius: 6px;
      background: var(--surface);
      border: 2px solid var(--border);
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: border-color 0.15s;
    }

    .photo-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .photo-thumb.selected { border-color: var(--accent); }
    .photo-thumb.selected::after {
      content: '✓';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(102,204,255,0.45);
      font-size: 14px; font-weight: 700;
      color: #fff;
    }

    .photo-thumb:hover { border-color: var(--accent2); }

    .none-thumb {
      aspect-ratio: 1;
      border-radius: 6px;
      background: var(--surface);
      border: 2px dashed var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--muted);
      transition: border-color 0.15s;
    }
    .none-thumb:hover { border-color: var(--muted); }
    .none-thumb.selected { border-color: var(--danger); border-style: solid; }

    .empty-photos {
      color: var(--muted);
      font-size: 12px;
      padding: 8px 0 4px;
    }

    .btn {
      width: 100%;
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

    .btn-row { display: flex; gap: 6px; }
    .btn-row .btn { flex: 1; }

    footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">🖼</div>
      <span data-i18n="logo-title">SiteDrop</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="openOptions" data-i18n-title="all-settings">⚙</button>
    </div>
  </header>

  <div class="current-site">
    <div class="site-label" data-i18n="cur-site">Current site</div>
    <div class="site-hostname" id="hostnameEl">—</div>
    <div class="site-status" id="statusEl" data-i18n="no-bg">No background set</div>
  </div>

  <div class="section">
    <div class="section-title" data-i18n="choose-bg">Choose background</div>
    <div class="photo-grid" id="photoGrid">
      <!-- filled by JS -->
    </div>
    <div id="emptyMsg" class="empty-photos" style="display:none" data-i18n="no-photos-settings">
      No photos yet — go to Settings to add some.
    </div>
  </div>

  <footer>
    <div class="btn-row">
      <button class="btn" id="openPhotoFolder" data-i18n="btn-photo-library">📁 Photo library</button>
      <button class="btn primary" id="openOptions2" data-i18n="btn-settings">Settings</button>
    </div>
  </footer>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
